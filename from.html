<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Tech Community</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <nav>
    <div class="logo">◆ TECH COM</div>
    <div>
      <a href="./index.html">Home</a>
      <a href="./form.html" class="active">Daftar</a>
      <a href="./gallery.html">Media</a>
    </div>
  </nav>

  <div class="container narrow">
    <div class="form-card">
      <h1>Form Pendaftaran</h1>

      <form id="registerForm">
        <div class="form-group">
          <label for="nama">Nama Lengkap</label>
          <input type="text" id="nama" placeholder="Masukkan nama..." required>
          <div class="error" id="err-nama">⚠ Nama tidak boleh kosong</div>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="contoh@email.com" required>
          <div class="error" id="err-email">⚠ Email tidak valid</div>
        </div>

        <div class="form-group">
          <label for="minat">Bidang Minat</label>
          <select id="minat" required>
            <option value="">-- Pilih Bidang --</option>
            <option value="Web Dev">Web Development</option>
            <option value="AI/ML">Artificial Intelligence</option>
            <option value="Cybersecurity">Cybersecurity</option>
            <option value="Mobile">Mobile Development</option>
            <option value="Data Science">Data Science</option>
          </select>
          <div class="error" id="err-minat">⚠ Pilih bidang minat</div>
        </div>

        <button type="submit" class="btn btn-full">✓ Daftar</button>
      </form>

      <button class="btn btn-back btn-full" onclick="history.back()">← Kembali</button>

      <div class="result" id="result">
        <h3>✓ Pendaftaran Berhasil!</h3>
        <p><strong>Nama:</strong> <span id="r-nama">-</span></p>
        <p><strong>Email:</strong> <span id="r-email">-</span></p>
        <p><strong>Bidang:</strong> <span id="r-minat">-</span></p>
      </div>

      <div class="counter">
        Anggota baru: <strong id="counter">0</strong>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2026 Tech Community | Coded with ◆</p>
  </footer>

  <script src="./script-form.js"></script>
</body>
</html>
